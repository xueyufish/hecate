name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What alternatives have you considered?
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Engine / Runtime
        - API / Gateway
        - RAG / Knowledge Base
        - Multi-Agent / Orchestration
        - Memory System
        - Security / Guardrails
        - MCP Integration
        - UI / Canvas
        - CLI
        - Documentation
        - Other
    validations:
      required: true
